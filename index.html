<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Escolar - Sistema de Gestão</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-book-open"></i>
                </div>
                <h1>Escola Estadual<span>  Mariana Cavalcanti</span></h1>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li class="nav-link" data-tab="livros">
                        <i class="fa-brands fa-bimobject"></i>
                        <a href="index.html" class="nav-link" data-tab="index">
                            <span>Biblioteca</span>
                        </a>
                    </li>
                    <li class="nav-link" data-tab="livros"> 
                        <a href="arcevo.html" class="nav-link" data-tab="livros">                       
                        <i class="fas fa-book"></i>                       
                            <span>Livros</span>
                        </a>
                    </li>
                    <li class="nav-link" data-tab="emprestimos">
                        <a href="emprestimo.html" class="nav-link" data-tab="emprestimos">
                            <i class="fas fa-book-reader"></i>
                            <span>Empréstimos</span>
                        </a>
                    </li>
                    <li class="nav-link" data-tab="controlDidatico">
                        <a href="controlDidatico.html" class="nav-link" data-tab="controlDidatico">
                            <i class="fa-solid fa-gear"></i>
                            <span>Controle Didático</span>
                        </a>    
                    </li>
                    <li class="nav-link" data-tab="atestados">
                        <a href="RegisterAtestado.html" class="nav-link" data-tab="atestados">
                            <i class="fa-solid fa-clipboard-check"></i>
                            <span>Registro de Atestados</span>
                        </a>
                    </li>
                    <li class="nav-link" data-tab="outros">
                        <a href="outros.html" class="nav-link" data-tab="outros">
                        <i class="fa-solid fa-network-wired"></i>
                        <span>Outros</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #4361ee, #6c8cff);">
                    <i class="fas fa-book"></i>
                </div>
                <div class="stat-info">
                    <h3>Total de Livros</h3>
                    <p class="stat-number" id="totalLivros">2.450</p>
                    <span class="stat-trend positive">
                        <i class="fas fa-arrow-up"></i> +12%
                    </span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #ff6b6b, #ff9f9f);">
                    <i class="fas fa-book-reader"></i>
                </div>
                <div class="stat-info">
                    <h3>Empréstimos Ativos</h3>
                    <p class="stat-number" id="emprestimosAtivos">156</p>
                    <span class="stat-trend neutral">
                        <i class="fas fa-minus"></i> 0%
                    </span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #51cf66, #8ce99a);">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3>Estudantes</h3>
                    <p class="stat-number" id="estudantes">890</p>
                    <span class="stat-trend positive">
                        <i class="fas fa-arrow-up"></i> +5%
                    </span>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #ffd43b, #ffe69b);">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3>Devoluções Pendentes</h3>
                    <p class="stat-number" id="devolucoesPendentes">23</p>
                    <span class="stat-trend negative">
                        <i class="fas fa-arrow-down"></i> -8%
                    </span>
                </div>
            </div>          
        </div>
    </main>
</body>
</html>
