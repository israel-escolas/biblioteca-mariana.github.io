<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão Escolar - Multi Turma</title>
    <link rel="stylesheet" href="assets/css/ficha_aluno.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-book-open"></i>
                </div>
                <h1>Escola Estadual<span>  Mariana Cavalcanti</span></h1>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li class="nav-link">
                        <a href="index.html">
                            <i class="fa-brands fa-bimobject"></i>
                            <span>Biblioteca</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="arcevo.html">
                            <i class="fas fa-book"></i>
                            <span>Livros</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="emprestimo.html">
                            <i class="fas fa-book-reader"></i>
                            <span>Empréstimos</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="controlDidatico.html">
                            <i class="fa-solid fa-gear"></i>
                            <span>Controle Didático</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="RegisterAtestado.html">
                            <i class="fa-solid fa-clipboard-check"></i>
                            <span>Registro de Atestados</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="ficha_aluno.html">
                            <i class="fa-solid fa-user-graduate"></i>
                            <span>FICHA DO ALUNO</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

        <!-- Botões de Seleção de Turma -->
        <div class="turmas-section">
            <div class="turmas-title">
                <i class="fas fa-users"></i>
                <span>Selecione a Turma</span>
            </div>
            <div class="turmas-buttons" id="turmasButtons">
                <button class="turma-btn" data-turma="1M">
                    <i class="fas fa-sun"></i> 1ª Série Matutino
                </button>
                <button class="turma-btn" data-turma="1V">
                    <i class="fas fa-moon"></i> 1ª Série Vespertino
                </button>
                <button class="turma-btn" data-turma="2M">
                    <i class="fas fa-sun"></i> 2ª Série Matutino
                </button>
                <button class="turma-btn" data-turma="2V">
                    <i class="fas fa-moon"></i> 2ª Série Vespertino
                </button>
                <button class="turma-btn" data-turma="3M">
                    <i class="fas fa-sun"></i> 3ª Série Matutino
                </button>
                <button class="turma-btn" data-turma="3V">
                    <i class="fas fa-moon"></i> 3ª Série Vespertino
                </button>
            </div>
        </div>

        <!-- Seção de seleção de aluno (inicialmente escondida) -->
        <div id="alunosSection" class="selection-section" style="display: none;">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchAluno" placeholder="Buscar aluno...">
            </div>
            
            <div class="students-list" id="studentsList">
                <div class="loading-students">
                    <div class="spinner-small"></div>
                    <p>Carregando lista de alunos...</p>
                </div>
            </div>
        </div>

        <!-- Card do aluno selecionado -->
        <div id="studentCard" class="student-card-container" style="display: none;">
            <div class="student-card-header">
                <button id="closeCard" class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
                <div class="student-card-title" id="studentCardTitle"></div>
                <div class="student-card-turma" id="studentCardTurma"></div>
            </div>
            <div id="studentData" class="student-data">
                <div class="loading-data">Carregando dados...</div>
            </div>
        </div>
    </div>

    <!-- Modal para ampliar imagem -->
    <div id="imageModal" class="image-modal" onclick="fecharModalImagem()">
        <span class="image-modal-close" onclick="fecharModalImagem()">&times;</span>
        <img id="modalImage" src="" alt="Foto ampliada">
    </div>

    <script src="assets/js/ficha_aluno.js"></script>
</body>
</html>
